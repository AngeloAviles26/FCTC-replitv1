kind = "mobile"
previewPath = "/"
title = "From Campus to Career"
version = "1.0.0"
id = "artifacts/campus-to-career"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23002

[services.development]
run = "pnpm --filter @workspace/campus-to-career run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-to-career", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/campus-to-career", "run", "serve" ]

[services.env]
PORT = "23002"
BASE_PATH = "/"
